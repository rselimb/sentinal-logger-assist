version: '3.9'

services:
  sentinel-v:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-v-security
    
    # Use host network mode to access system logs and manage iptables
    network_mode: host
    
    # Security capabilities needed for iptables management
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_PTRACE
    
    # Mount system logs and critical files
    volumes:
      # System logs (read-only)
      - /var/log:/var/log:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/shadow:/etc/shadow:ro
      - /etc/sudoers:/etc/sudoers:ro
      
      # Persistent database volume
      - sentinel-db:/opt/sentinel-v/data
      
      # SSH keys for authorized_keys monitoring
      - /root/.ssh:/root/.ssh:ro
    
    # Environment variables
    environment:
      SENTINEL_DB_PATH: /opt/sentinel-v/data/sentinel.db
      DASHBOARD_PORT: "5000"
      DASHBOARD_HOST: "0.0.0.0"
      SSH_LOG_PATH: "/var/log/auth.log"
      WEB_LOG_PATH: "/var/log/nginx/access.log"
      # Discord webhook URL (optional, set via .env file)
      # DISCORD_WEBHOOK_URL: "https://discord.com/api/webhooks/..."
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    
    # Restart policy
    restart: unless-stopped
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    
    # Privileged mode for comprehensive system access
    privileged: false
    
    # Read-only root filesystem (optional, for extra security)
    read_only: false

# Named volume for persistent data
volumes:
  sentinel-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data

# Network configuration
networks:
  default:
    name: sentinel-network
    driver: bridge
